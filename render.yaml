# Render.com Blueprint — Orkestree deploy
# Docs: https://render.com/docs/blueprint-spec

databases:
  - name: orkestree-postgres
    plan: free
    databaseName: orkestree
    user: orkestree
    postgresMajorVersion: "16"

services:
  # Redis service (free tier)
  - type: keyvalue
    name: orkestree-redis
    plan: free
    ipAllowList: []  # Allow internal access only

  # API service (NestJS)
  - type: web
    name: orkestree-api
    runtime: node
    plan: free
    region: oregon  # US West, melhor latência BR
    branch: main
    rootDir: .
    buildCommand: |
      corepack enable && \
      corepack prepare pnpm@10.33.2 --activate && \
      pnpm install --frozen-lockfile && \
      pnpm --filter @orkestree/api exec prisma generate && \
      pnpm --filter @orkestree/api build
    startCommand: |
      pnpm --filter @orkestree/api exec prisma migrate deploy && \
      node apps/api/dist/main
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: orkestree-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: orkestree-redis
          type: keyvalue
          property: connectionString
      - key: JWT_SECRET
        sync: false  # Set manualmente no dashboard
      - key: JWT_REFRESH_SECRET
        sync: false  # Set manualmente no dashboard
      - key: WEB_ORIGIN
        value: "*"  # Temporário, troca depois pra URL Vercel
